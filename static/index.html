<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPT-2 Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #151821;
      --border:   #252a35;
      --accent:   #4fffb0;
      --accent2:  #00c9ff;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --user-bg:  #1a2435;
      --bot-bg:   #111519;
      --radius:   12px;
      --font-mono: 'JetBrains Mono', monospace;
      --font-ui:   'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px; font-weight: 800;
      color: #000; font-family: var(--font-ui);
    }

    header h1 {
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: -0.02em;
    }

    header span {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-left: auto;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      gap: 10px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .controls select,
    .controls input[type=range] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .controls select:focus { outline: 1px solid var(--accent); }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .range-val {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      min-width: 28px;
    }

    /* ── Chat window ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 780px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid #2a3a55;
      color: var(--text);
      border-bottom-right-radius: 3px;
    }

    .msg.bot .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: #c8fce8;
      border-bottom-left-radius: 3px;
    }

    .msg-meta {
      font-size: 0.62rem;
      font-family: var(--font-mono);
      color: var(--muted);
      margin-top: 4px;
    }

    /* typing indicator */
    .typing .msg-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #promptInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 10px 14px;
      border-radius: var(--radius);
      resize: none;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #promptInput:focus { border-color: var(--accent); }
    #promptInput::placeholder { color: var(--muted); }

    #sendBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #000;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 10px 22px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #sendBtn:hover   { opacity: 0.9; }
    #sendBtn:active  { transform: scale(0.97); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }

    .empty-state h2 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.85rem;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">G</div>
  <h1>GPT-2 Chatbot</h1>
  <div class="status-dot" id="statusDot" title="Model status"></div>
  <span id="deviceLabel">checking...</span>
</header>

<div class="controls">
  <div class="control-group">
    <label for="strategy">Strategy</label>
    <select id="strategy">
      <option value="top_k" selected>Top-K</option>
      <option value="nucleus">Nucleus</option>
      <option value="greedy">Greedy</option>
    </select>
  </div>

  <div class="control-group">
    <label for="temperature">Temp</label>
    <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.8"/>
    <span class="range-val" id="tempVal">0.8</span>
  </div>

  <div class="control-group">
    <label for="maxTokens">Tokens</label>
    <input type="range" id="maxTokens" min="20" max="250" step="10" value="100"/>
    <span class="range-val" id="tokensVal">100</span>
  </div>
</div>

<div id="chat">
  <div class="empty-state" id="emptyState">
    <h2>GPT-2 Language Model</h2>
    <p>Type a prompt to generate a continuation.</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="promptInput" rows="2" placeholder="Enter a prompt…"></textarea>
  <button id="sendBtn">Generate</button>
</div>

<script>
  const chat        = document.getElementById("chat");
  const input       = document.getElementById("promptInput");
  const sendBtn     = document.getElementById("sendBtn");
  const emptyState  = document.getElementById("emptyState");
  const strategyEl  = document.getElementById("strategy");
  const tempEl      = document.getElementById("temperature");
  const tempVal     = document.getElementById("tempVal");
  const tokensEl    = document.getElementById("maxTokens");
  const tokensVal   = document.getElementById("tokensVal");
  const deviceLabel = document.getElementById("deviceLabel");
  const statusDot   = document.getElementById("statusDot");

  // ── Sync sliders ──────────────────────────────────────────────────────────
  tempEl.addEventListener("input",   () => tempVal.textContent   = tempEl.value);
  tokensEl.addEventListener("input", () => tokensVal.textContent = tokensEl.value);

  // ── Health check ─────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res  = await fetch("/health");
      const data = await res.json();
      deviceLabel.textContent = `device: ${data.device}`;
      if (!data.model || !data.tokenizer) {
        statusDot.style.background = "#ff4444";
        statusDot.style.boxShadow  = "0 0 6px #ff4444";
      }
    } catch {
      deviceLabel.textContent = "server offline";
      statusDot.style.background = "#ff4444";
    }
  }
  checkHealth();

  // ── Helpers ───────────────────────────────────────────────────────────────
  function appendMsg(role, text, meta = "") {
    if (emptyState) emptyState.remove();

    const wrap   = document.createElement("div");
    wrap.className = `msg ${role}`;

    const label  = document.createElement("div");
    label.className = "msg-label";
    label.textContent = role === "user" ? "You" : "GPT-2";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);

    if (meta) {
      const m = document.createElement("div");
      m.className = "msg-meta";
      m.textContent = meta;
      wrap.appendChild(m);
    }

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap   = document.createElement("div");
    wrap.className = "msg bot typing";
    wrap.id = "typing";

    const label  = document.createElement("div");
    label.className = "msg-label";
    label.textContent = "GPT-2";

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing")?.remove();
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  async function send() {
    const prompt = input.value.trim();
    if (!prompt) return;

    input.value = "";
    sendBtn.disabled = true;

    appendMsg("user", prompt);
    showTyping();

    try {
      const res = await fetch("/generate", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt,
          strategy:       strategyEl.value,
          temperature:    parseFloat(tempEl.value),
          max_new_tokens: parseInt(tokensEl.value),
        }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        appendMsg("bot", `Error: ${data.error}`);
      } else {
        const meta = `strategy: ${data.strategy}  ·  ${data.latency_ms}ms`;
        appendMsg("bot", data.response, meta);
      }
    } catch (err) {
      removeTyping();
      appendMsg("bot", "Could not reach the server.");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>
</body>
</html>
